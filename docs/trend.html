<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
      Content-Security-Policy as defence-in-depth, mirroring docs/index.html
      (issue #189). All scripts are external so script-src omits 'unsafe-inline'.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'"
    >

    <!-- PWA Meta Tags (issue #224) -->
    <meta name="application-name" content="GRQ Validation">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="GRQ Validation">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-config" content="/browserconfig.xml">
    <meta name="msapplication-TileColor" content="#667eea">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="theme-color" content="#667eea">
    <meta name="app-version" content="1.1.22">
    <meta name="app-title" content="GRQ Validation Trend">

    <!-- Version/title bootstrap (CSP-safe, issue #189) -->
    <script src="version.js"></script>

    <!-- Theme selector: Auto/Light/Dark toggle (issue #233) -->
    <script src="theme.js"></script>

    <!-- Apple Touch Icons (issue #224) -->
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167x167.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png">

    <!-- Favicons (issue #224) -->
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16x16.png">

    <!-- Web App Manifest (issue #224) -->
    <link rel="manifest" href="manifest.json">

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    >

    <!-- Chart.js (version-pinned with Subresource Integrity) -->
    <script
      src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1"
      integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"
      integrity="sha384-cVMg8E3QFwTvGCDuK+ET4PD341jF3W8nO1auiXfuZNQkzbUUiBGLsIQUE+b1mxws"
      crossorigin="anonymous"
    ></script>

    <!-- Custom styles -->
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="bg-light">
    <div class="container-fluid">
      <div class="row">
        <div class="col-12">
          <div class="card shadow-sm border-0">
            <div class="card-header header-gradient text-white text-center py-4">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <a
                  href="index.html"
                  id="backToDashboardLink"
                  class="btn btn-outline-light btn-sm"
                >← Dashboard</a>
                <h1 class="display-4 mb-0">Prediction Trend</h1>
                <button
                  id="theme-toggle"
                  type="button"
                  class="btn btn-outline-light btn-sm theme-toggle-auto"
                  title="Auto mode — following system (click for light mode)"
                  aria-label="Auto mode — following system (click for light mode)"
                >
                  <span id="theme-toggle-icon" aria-hidden="true">🌓</span>
                </button>
              </div>
              <p class="lead mb-0">
                Average Actual % vs Target % over the matured-prediction history
              </p>
            </div>

            <div class="card-body p-4">
              <!-- Controls -->
              <div class="row mb-4 g-3 align-items-end">
                <div class="col-md-4 col-lg-3">
                  <label for="groupingSelect" class="form-label fw-bold"
                  >Group by:</label>
                  <select id="groupingSelect" class="form-select">
                    <option value="day">Day</option>
                    <option value="week">Week</option>
                    <option value="month">Month</option>
                    <option value="quarter">Quarter</option>
                  </select>
                </div>
                <div class="col-md-8 col-lg-9">
                  <fieldset>
                    <legend class="form-label fw-bold fs-6">
                      Benchmark overlays:
                    </legend>
                    <div id="overlayControls"></div>
                  </fieldset>
                </div>
              </div>

              <!-- Loading, Error and Empty states -->
              <div id="trendLoading" class="loading text-center py-5">
                <div class="spinner-border text-primary" role="status">
                  <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3">Loading trend data...</p>
              </div>

              <div
                id="trendError"
                class="alert alert-danger"
                style="display: none"
              ></div>

              <div
                id="trendEmpty"
                class="alert alert-info"
                style="display: none"
              >
                No matured predictions yet. A prediction joins the trend once its
                full 90-day window has elapsed — please check back later.
              </div>

              <!-- Chart -->
              <div id="trendChartCard" class="card mb-4" style="display: none">
                <div class="card-body">
                  <div class="chart-container">
                    <canvas
                      id="trendChart"
                      aria-label="Line chart of average Actual percentage versus average Target percentage over time"
                      role="img"
                    ></canvas>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Version display -->
    <div class="text-center text-muted small py-2">
      v<span id="version"></span>
    </div>

    <!-- Shared projection/scoring maths — must load before the engines below -->
    <script src="projection.js"></script>

    <!-- Shared low-volume/liquidity helper (issue #576) — before
         trend_predictions.js, which flags low-volume names (issue #577) -->
    <script src="volume_recommend.js"></script>

    <!-- Shared number-formatting helpers (issue #276) -->
    <script src="format.js"></script>

    <!-- Benchmark-index extraction (issue #279) — before index_overlay.js -->
    <script src="market_index.js"></script>

    <!-- Trend data engine (issue #429) -->
    <script src="trend_series.js"></script>

    <!-- Benchmark-index overlay engine (issue #431) -->
    <script src="index_overlay.js"></script>

    <!-- Trend-view persisted settings (issue #432) -->
    <script src="trend_settings.js"></script>

    <!-- Transient ?group=day|week|month|quarter grouping deep-link (issue #481) —
         after trend_settings.js (reuses its granularities), before trend.js. -->
    <script src="trend_grouping_link.js"></script>

    <!-- Transient ?indices= benchmark-index deep-link (issue #480) —
         after index_overlay.js, before trend.js. -->
    <script src="trend_indices_deeplink.js"></script>

    <!-- Per-score-date prediction resolver (issue #430) -->
    <script src="trend_predictions.js"></script>

    <!-- View deep-link (?view=portfolio|trend) selection helpers (issue #479) —
         before trend.js, which routes ?view=portfolio back to index.html. -->
    <script src="view_selection.js"></script>

    <!-- Date deep-link helpers (issue #436/#517) — before trend.js, which uses
         them to forward the selected ?date= onto the "← Dashboard" link. -->
    <script src="date_selection.js"></script>

    <!-- Trend view controller (issue #430) -->
    <script src="trend.js"></script>

    <!-- Service Worker Registration (issue #224) -->
    <script src="sw-register.js?v=1.1.22"></script>
  </body>
</html>
