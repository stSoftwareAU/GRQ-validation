name: Markdown Lint

on:
  pull_request:
    branches: ["*"]
  # Issue #726: this lint/checker gates the PR, so it no longer runs on push to
  # the default branch — that re-ran the same check the PR already passed and
  # wasted CI minutes. Manual dispatch stays available for ad-hoc runs.
  workflow_dispatch:

# Cancel superseded runs (Issue #139): rapid pushes to the same ref otherwise
# queue redundant scans that each hold a runner. Keying on workflow + ref with
# cancel-in-progress leaves only the latest run for a given ref alive.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # Issue #736: this job only lints markdown — it never pushes back nor
          # fetches a private submodule, so it does not need the GITHUB_TOKEN
          # written to .git/config, where a later compromised step could read
          # it. Do not persist the credential to disk.
          persist-credentials: false
      # actions/setup-node@v4
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "lts/*"
      # Install markdownlint-cli2 with a pinned exact version and install
      # scripts disabled (Issue #533, supply-chain hardening per Issue #2184).
      # Without --ignore-scripts the npm lifecycle hooks of markdownlint-cli2
      # and its entire transitive tree run in CI against the checked-out
      # workspace, and an unpinned spec floats to whatever the registry serves
      # each run — the install-time code-execution pivot of the Shai-Hulud and
      # Axios npm incidents. markdownlint-cli2 is pure JS with no build step, so
      # --ignore-scripts is safe and changes nothing functionally.
      - name: Install markdownlint-cli2
        run: npm install -g --ignore-scripts markdownlint-cli2@0.22.1
      - name: Run markdownlint-cli2
        run: markdownlint-cli2
