name: Deno Quality

on:
  pull_request:
    branches: ["*"]
  schedule:
    # Weekly audit so a JSR/@std compromise is caught even with no open PR.
    - cron: "0 6 * * 1"

# Cancel superseded runs (Issue #139): rapid pushes to the same ref otherwise
# queue redundant scans that each hold a runner. Keying on workflow + ref with
# cancel-in-progress leaves only the latest run for a given ref alive.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # This job only runs Deno quality checks and uploads coverage — it
          # never pushes back to the repo or fetches a private submodule, so the
          # GITHUB_TOKEN must not be persisted into .git/config where a later
          # compromised step could read it (Issue #734).
          persist-credentials: false
      # denoland/setup-deno@v2.0.4
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed
        with:
          deno-version: v2.x
      - name: Deno lint
        run: deno lint
      - name: Deno fmt check
        run: deno fmt --check
      - name: Deno type check
        run: deno check helpers/*.ts tests/*.ts
      # Scan the resolved JSR/@std dependency graph against the advisory
      # database — the Deno-side counterpart to `cargo audit` (Issue #59).
      - name: Deno audit
        run: deno audit
      # Run tests with coverage and upload to Codecov (Issue #1636).
      # The codecov-action is a no-op when no test files are found.
      - name: Run tests with coverage
        run: deno test --allow-read --allow-env --coverage=cov_profile tests/*.ts
      - name: Generate lcov report
        run: deno coverage cov_profile --lcov --output=coverage.lcov
      # codecov/codecov-action@v4
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          files: coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
