name: Version Bump

# Auto-increment the dashboard app version on every pull request so the
# service-worker cache key changes and clients pick up the new build
# (Issue #323). This replaces the unreliable local pre-commit hook.
on:
  pull_request:
    branches: [ main ]

# Cancel superseded runs so rapid pushes to the same PR ref do not race on the
# version-bump commit (mirrors the other workflows in this repo).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bump-version:
    name: Increment app version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Forks cannot push back to the PR branch, so only run for same-repo PRs.
    # Skip our own bot commit to avoid a self-trigger loop.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # Check out the PR branch head (not the merge ref) so we can commit
          # the bump back to it. Full history is needed to read the base.
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # denoland/setup-deno@v2.0.4
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed
        with:
          deno-version: v2.x

      - name: Increment app version if not already bumped
        # Pass untrusted `github` context through env to avoid shell injection
        # in the run script (semgrep run-shell-injection).
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          # Read the app version on the base branch. If the file is missing
          # there, BASE_VERSION stays empty and the script always bumps.
          BASE_VERSION="$(git show "origin/${BASE_REF}:docs/sw.js" 2>/dev/null \
            | sed -n 's/.*APP_VERSION = "\([^"]*\)".*/\1/p' || true)"
          echo "Base (${BASE_REF}) app version: ${BASE_VERSION:-<none>}"
          deno run --allow-read --allow-write scripts/bump_version.ts \
            --base-version "${BASE_VERSION}"

      - name: Commit and push the bump
        # Pass untrusted `github` context through env to avoid shell injection
        # in the run script (semgrep run-shell-injection).
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "App version already bumped on this branch; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/sw.js docs/sw-register.js docs/trend.html
          git commit -m "Auto-increment app version (Issue #323)"
          git push origin "HEAD:${HEAD_REF}"
