name: Cargo Audit

on:
  pull_request:
    branches: ["*"]
  schedule:
    - cron: "0 6 * * 1"

# Cancel superseded runs (Issue #139): rapid pushes to the same ref otherwise
# queue redundant scans that each hold a runner. Keying on workflow + ref with
# cancel-in-progress leaves only the latest run for a given ref alive.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Disable cargo's HTTP/2 multiplexing. Crate downloads on GitHub runners
    # intermittently die with "Error in the HTTP2 framing layer" (curl 8.x),
    # which fails `cargo install cargo-audit` before the audit even runs.
    # Falling back to HTTP/1.1 sidesteps the flaky framing layer.
    env:
      CARGO_HTTP_MULTIPLEXING: "false"
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Install cargo-audit
        # Pin to an explicit version with --locked so CI does not compile and
        # run an arbitrary newest cargo-audit dependency tree (Issue #124).
        run: cargo install cargo-audit --locked --version 0.22.2
      - name: Run cargo audit
        run: cargo audit
