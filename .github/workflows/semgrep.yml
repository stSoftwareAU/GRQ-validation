name: Semgrep

# Static analysis security testing (SAST) via Semgrep (Issue #21).
#
# Runs the Semgrep `p/default` ruleset on every pull request. The job
# runs inside the official `semgrep/semgrep` container so the CLI is
# pre-installed. SEMGREP_APP_TOKEN, when present as a repo/org secret,
# uploads findings to Semgrep AppSec Platform; without it the scan still
# runs locally and fails the build on findings.
#
# Third-party actions are pinned to 40-character commit SHAs and the
# third-party container image is pinned to an immutable sha256 digest to
# satisfy the supply-chain rule (Issue #1756 / #72 / dep-bump guidelines).

on:
  pull_request:
    branches: ["*"]

# Cancel superseded runs (Issue #139): rapid pushes to the same ref otherwise
# queue redundant scans that each hold a runner. Keying on workflow + ref with
# cancel-in-progress leaves only the latest run for a given ref alive.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      # semgrep/semgrep:latest — third-party image pinned to an immutable
      # digest (Issue #72). Refresh deliberately when bumping the scanner;
      # resolve with `docker buildx imagetools inspect semgrep/semgrep:latest`.
      image: semgrep/semgrep@sha256:f4791a54c891eabe1188248135574e6e03dfc31dfd3f3b747c7bec7079bfed1b
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Run Semgrep CI
        run: semgrep ci --config p/default
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
