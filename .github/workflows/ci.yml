name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

# Cancel superseded runs (Issue #69). Force-pushes and rapid commits to the
# same ref otherwise queue redundant full runs (test, release build, SBOM,
# Pages deploy) that each hold a runner and can race on shared resources such
# as the Pages deployment. Keying on workflow + ref with cancel-in-progress
# leaves only the latest run for a given ref alive.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default GITHUB_TOKEN scope (Issue #70). check-changes, test,
# and build only ever read repository contents, so they inherit this. The
# deploy-pages job overrides it below where elevation is genuinely needed.
permissions:
  contents: read

jobs:
  check-changes:
    name: Check for Changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      rust-changed: ${{ steps.filter.outputs.rust }}
      docs-changed: ${{ steps.filter.outputs.docs }}
    steps:
    - name: Checkout code
      # actions/checkout@v4.2.2
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        fetch-depth: 0  # Fetch full history for proper diffs
        
    - name: Check for changes
      id: filter
      run: |
        set -euo pipefail
        # Get list of changed files
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          # For PRs, compare with base branch using GitHub's merge-base
          git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.sha }} > changed_files.txt
        else
          # For pushes, compare with previous commit
          # Handle case where before SHA might be null (first commit)
          if [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ] && [ -n "${{ github.event.before }}" ]; then
            git diff --name-only ${{ github.event.before }}...${{ github.sha }} > changed_files.txt
          else
            # For first commit, show all files
            git ls-tree -r --name-only ${{ github.sha }} > changed_files.txt
          fi
        fi
        
        # Check if Rust files changed
        if grep -E "^(src/|Cargo\.toml|Cargo\.lock|tests/)" changed_files.txt > /dev/null; then
          echo "rust=true" >> $GITHUB_OUTPUT
        else
          echo "rust=false" >> $GITHUB_OUTPUT
        fi
        
        # Check if docs changed
        if grep -E "^(docs/)" changed_files.txt > /dev/null; then
          echo "docs=true" >> $GITHUB_OUTPUT
        else
          echo "docs=false" >> $GITHUB_OUTPUT
        fi
        
        echo "Changed files:"
        cat changed_files.txt

  test:
    name: Test and Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check-changes
    if: needs.check-changes.outputs.rust-changed == 'true'
    
    steps:
    - name: Checkout code
      # actions/checkout@v4.2.2
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
    - name: Install Rust toolchain
      # dtolnay/rust-toolchain@stable
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      with:
        components: rustfmt, clippy
        
    - name: Cache dependencies
      # actions/cache@v4.3.0
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    - name: Update dependencies
      run: cargo update
      
    - name: Check formatting
      run: cargo fmt --all -- --check
      
    - name: Run linter
      run: cargo clippy --all-targets --all-features -- -D warnings
      
    - name: Check types
      run: cargo check --all-targets --all-features
      
    - name: Run tests
      run: cargo test --all-targets --all-features --verbose
      
    - name: Generate test coverage
      run: |
        cargo install cargo-tarpaulin
        cargo tarpaulin --out Xml --output-dir coverage
      continue-on-error: true
      
    - name: Upload coverage to Codecov
      # codecov/codecov-action@v4
      uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
      with:
        file: ./coverage/cobertura.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      continue-on-error: true

  build:
    name: Build Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [check-changes, test]
    if: needs.check-changes.outputs.rust-changed == 'true' && (needs.test.result == 'success' || needs.test.result == 'skipped')
    
    steps:
    - name: Checkout code
      # actions/checkout@v4.2.2
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
    - name: Install Rust toolchain
      # dtolnay/rust-toolchain@stable
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        
    # Check bash script syntax
    - name: Check Bash Script Syntax
      run: |
        echo "Checking bash script syntax..."
        find . -name "*.sh" -type f -exec bash -n {} \;
        echo "All bash scripts have valid syntax"

    - name: Cache dependencies
      # actions/cache@v4.3.0
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    - name: Build release
      run: cargo build --release

    # SCR-SBOM (Issue #53): generate a machine-readable component inventory
    # alongside the binary so post-disclosure incident triage can answer
    # "did we ship crate X version Y?" in seconds.
    - name: Generate CycloneDX SBOM
      run: |
        set -euo pipefail
        cargo install cargo-cyclonedx
        cargo cyclonedx --format json
        # cargo-cyclonedx names the SBOM after the package; normalise the
        # path so the upload step always finds it.
        if [ -f grq-validation.cdx.json ]; then
          echo "SBOM generated: grq-validation.cdx.json"
        else
          sbom=$(find . -maxdepth 2 -name '*.cdx.json' ! -path './target/*' | head -n1)
          if [ -n "$sbom" ]; then
            cp "$sbom" grq-validation.cdx.json
            echo "SBOM copied from $sbom to grq-validation.cdx.json"
          else
            echo "No CycloneDX SBOM produced" >&2
            exit 1
          fi
        fi

    - name: Upload build artifacts
      # actions/upload-artifact@v4.6.2
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: grq-validation-release
        path: |
          target/release/grq-validation
          grq-validation.cdx.json

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check-changes
    if: |
      github.ref == 'refs/heads/main' && 
      needs.check-changes.outputs.docs-changed == 'true'
    # A per-job block fully overrides the top-level default, so contents: read
    # is restated here for the checkout step alongside the Pages elevation.
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
    - name: Checkout code
      # actions/checkout@v4.2.2
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
    - name: Setup Pages
      # actions/configure-pages@v4.0.0
      uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d
      
    - name: Upload artifact
      # actions/upload-pages-artifact@v3.0.1
      uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
      with:
        path: ./docs
      
    - name: Deploy to GitHub Pages
      id: deployment
      # actions/deploy-pages@v4.0.5
      uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e