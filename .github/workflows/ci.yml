name: CI/CD Pipeline

# Run the Rust gate on `main` and on milestone integration branches
# (Issue #342). PRs whose base is a `milestone/**` branch must run the same
# fmt/clippy/check/test gate as `main`; previously they bypassed it because the
# triggers listed only `main`. `deploy-pages` stays main-only via its own
# `github.ref` guard below, so milestone PRs never publish Pages.
on:
  push:
    branches: [ main, "milestone/**" ]
  pull_request:
    branches: [ main, "milestone/**" ]

env:
  CARGO_TERM_COLOR: always

# Cancel superseded runs (Issue #69). Force-pushes and rapid commits to the
# same ref otherwise queue redundant full runs (test, release build, SBOM,
# Pages deploy) that each hold a runner and can race on shared resources such
# as the Pages deployment. Keying on workflow + ref with cancel-in-progress
# leaves only the latest run for a given ref alive.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default GITHUB_TOKEN scope (Issue #70). check-changes, test,
# and build only ever read repository contents, so they inherit this. The
# deploy-pages job overrides it below where elevation is genuinely needed.
permissions:
  contents: read

jobs:
  check-changes:
    name: Check for Changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      rust-changed: ${{ steps.filter.outputs.rust }}
      docs-changed: ${{ steps.filter.outputs.docs }}
    steps:
    - name: Checkout code
      # actions/checkout@v4.2.2
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        fetch-depth: 0  # Fetch full history for proper diffs
        
    - name: Check for changes
      id: filter
      run: |
        set -euo pipefail
        # Get list of changed files
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          # For PRs, compare with base branch using GitHub's merge-base
          git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.sha }} > changed_files.txt
        else
          # For pushes, compare with previous commit
          # Handle case where before SHA might be null (first commit)
          if [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ] && [ -n "${{ github.event.before }}" ]; then
            git diff --name-only ${{ github.event.before }}...${{ github.sha }} > changed_files.txt
          else
            # For first commit, show all files
            git ls-tree -r --name-only ${{ github.sha }} > changed_files.txt
          fi
        fi
        
        # Check if Rust files changed
        if grep -E "^(src/|Cargo\.toml|Cargo\.lock|tests/)" changed_files.txt > /dev/null; then
          echo "rust=true" >> $GITHUB_OUTPUT
        else
          echo "rust=false" >> $GITHUB_OUTPUT
        fi
        
        # Check if docs changed
        if grep -E "^(docs/)" changed_files.txt > /dev/null; then
          echo "docs=true" >> $GITHUB_OUTPUT
        else
          echo "docs=false" >> $GITHUB_OUTPUT
        fi
        
        echo "Changed files:"
        cat changed_files.txt

  test:
    name: Test and Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check-changes
    if: needs.check-changes.outputs.rust-changed == 'true'
    
    steps:
    - name: Checkout code
      # actions/checkout@v4.2.2
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      
    - name: Install Rust toolchain
      # dtolnay/rust-toolchain@stable
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      with:
        components: rustfmt, clippy
        
    - name: Cache dependencies
      # actions/cache@v4.3.0
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    # Supply-chain quarantine (Issue #124): CI builds the committed, reviewed
    # Cargo.lock rather than running `cargo update` to float every crate to the
    # newest in-range version on each run. `--locked` makes the build fail if
    # Cargo.lock is stale instead of silently resolving (and executing the
    # build.rs / proc-macros of) a freshly-published, unquarantined crate.
    # Dependency bumps land through the quarantined Dependabot PRs instead
    # (.github/dependabot.yml), mirroring the Deno minimumDependencyAge policy.
    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Run linter
      run: cargo clippy --locked --all-targets --all-features -- -D warnings

    - name: Check types
      run: cargo check --locked --all-targets --all-features

    - name: Run tests
      run: cargo test --locked --all-targets --all-features --verbose

    - name: Generate test coverage
      # Pin the tool to an explicit version with --locked so CI does not
      # compile and run an arbitrary newest cargo-tarpaulin dependency tree
      # on each run (Issue #124).
      run: |
        cargo install cargo-tarpaulin --locked --version 0.35.4
        cargo tarpaulin --out Xml --output-dir coverage
      continue-on-error: true
      
    - name: Upload coverage to Codecov
      # codecov/codecov-action@v4
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
      with:
        file: ./coverage/cobertura.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      continue-on-error: true

  build:
    name: Build Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [check-changes, test]
    if: needs.check-changes.outputs.rust-changed == 'true' && (needs.test.result == 'success' || needs.test.result == 'skipped')
    
    steps:
    - name: Checkout code
      # actions/checkout@v4.2.2
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      
    - name: Install Rust toolchain
      # dtolnay/rust-toolchain@stable
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        
    # Check bash script syntax
    - name: Check Bash Script Syntax
      run: |
        set -euo pipefail
        echo "Checking bash script syntax..."
        find . -name "*.sh" -type f -exec bash -n {} \;
        echo "All bash scripts have valid syntax"

    - name: Cache dependencies
      # actions/cache@v4.3.0
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    - name: Build release
      # --locked: build the committed Cargo.lock, never float deps (Issue #124).
      run: cargo build --locked --release

    # SCR-SBOM (Issue #53): generate a machine-readable component inventory
    # alongside the binary so post-disclosure incident triage can answer
    # "did we ship crate X version Y?" in seconds.
    - name: Generate CycloneDX SBOM
      run: |
        set -euo pipefail
        # Pin the tool to an explicit version with --locked so CI does not
        # compile an arbitrary newest cargo-cyclonedx tree on each run (#124).
        cargo install cargo-cyclonedx --locked --version 0.5.9
        cargo cyclonedx --format json
        # cargo-cyclonedx names the SBOM after the package; normalise the
        # path so the upload step always finds it.
        if [ -f grq-validation.cdx.json ]; then
          echo "SBOM generated: grq-validation.cdx.json"
        else
          sbom=$(find . -maxdepth 2 -name '*.cdx.json' ! -path './target/*' | head -n1)
          if [ -n "$sbom" ]; then
            cp "$sbom" grq-validation.cdx.json
            echo "SBOM copied from $sbom to grq-validation.cdx.json"
          else
            echo "No CycloneDX SBOM produced" >&2
            exit 1
          fi
        fi

    - name: Upload build artifacts
      # actions/upload-artifact@v4.6.2
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: grq-validation-release
        path: |
          target/release/grq-validation
          grq-validation.cdx.json

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check-changes
    if: |
      github.ref == 'refs/heads/main' && 
      needs.check-changes.outputs.docs-changed == 'true'
    # A per-job block fully overrides the top-level default, so contents: read
    # is restated here for the checkout step alongside the Pages elevation.
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
    - name: Checkout code
      # actions/checkout@v4.2.2
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      
    - name: Setup Pages
      # actions/configure-pages@v4.0.0
      uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d
      
    - name: Upload artifact
      # actions/upload-pages-artifact@v3.0.1
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
      with:
        path: ./docs
      
    - name: Deploy to GitHub Pages
      id: deployment
      # actions/deploy-pages@v4.0.5
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128