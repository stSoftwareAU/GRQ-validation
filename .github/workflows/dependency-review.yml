name: Dependency Review

on:
  pull_request:
    branches: ["*"]

# Cancel superseded runs (Issue #139): rapid pushes to the same ref otherwise
# queue redundant scans that each hold a runner. Keying on workflow + ref with
# cancel-in-progress leaves only the latest run for a given ref alive.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # This job only reviews dependency changes — it never pushes back to
          # the repo or fetches a private submodule, so the GITHUB_TOKEN must
          # not be persisted into .git/config where a later compromised step
          # could read it (Issue #735).
          persist-credentials: false
      # actions/dependency-review-action@v4.9.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
