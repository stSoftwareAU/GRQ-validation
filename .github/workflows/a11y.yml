name: Accessibility

# Automated accessibility (a11y) gate for the docs/ dashboard UI (Issue #92).
#
# The repo ships an interactive "GRQ Validation Dashboard" from docs/
# (index.html, list.html, app.js, list.js) and publishes it to GitHub Pages.
# This workflow runs pa11y-ci against the rendered dashboard pages on every
# pull request that touches docs/, failing the build on WCAG 2.1 AA violations
# so accessibility regressions (missing form labels, insufficient colour
# contrast, missing alt text, non-keyboard-navigable controls) are caught on
# the pull request that introduces them — the same gate the existing
# semgrep/gitleaks checks apply.
#
# Third-party actions are pinned to 40-character commit SHAs to satisfy the
# supply-chain rule, consistent with the other workflows in this repo.

on:
  pull_request:
    paths: ["docs/**"]

# Cancel superseded runs (Issue #172): rapid pushes to the same ref otherwise
# queue redundant accessibility scans that each hold a runner. Keying on
# workflow + ref with cancel-in-progress leaves only the latest run for a
# given ref alive, matching every other PR-triggered workflow in this repo.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pa11y:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # actions/setup-node@v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          # Track the current LTS rather than a pinned major: Node 20 reaches
          # end-of-life on GitHub-hosted runners (2026-09-16), so pinning it
          # runs the toolchain (http-server, pa11y-ci) on an unsupported
          # interpreter. lts/* keeps the gate on a maintained runtime, matching
          # markdown-lint.yml (Issue #171).
          node-version: "lts/*"
      - name: Serve docs/ dashboard and wait for it to come up
        run: |
          set -euo pipefail
          npx --yes http-server docs -p 8080 --silent &
          for i in $(seq 1 30); do
            if curl -sSf http://localhost:8080/index.html >/dev/null 2>&1; then
              echo "Static server is up"
              break
            fi
            sleep 1
          done
      # pa11y-ci pulls in Puppeteer, but Puppeteer v22+ no longer downloads
      # Chrome during install — the browser must be fetched explicitly, or the
      # run dies with "Could not find Chrome (ver. ...)". Install pa11y-ci
      # locally first so its own Puppeteer drives the download; that pins the
      # Chrome build to the exact version Puppeteer resolves at launch (a bare
      # `npx puppeteer ...` could resolve a different Puppeteer, and so a
      # mismatched Chrome build).
      - name: Install pa11y-ci
        run: npm install --no-save pa11y-ci
      - name: Install the Chrome build pa11y-ci's Puppeteer expects
        run: |
          set -euo pipefail
          # Puppeteer refuses to repair a half-populated cache entry: if the
          # version folder exists but the chrome binary is missing, the install
          # aborts with "All providers failed ... executable is missing" rather
          # than re-downloading. The pa11y-ci install above can leave the cache
          # in exactly that partial state, so clear it first to guarantee a
          # clean download every run.
          rm -rf "${HOME}/.cache/puppeteer/chrome"
          # A bare `npx puppeteer browsers install chrome` resolves the LATEST
          # puppeteer release, which pins a different Chrome build than the
          # puppeteer-core bundled inside pa11y-ci. The launcher then dies with
          # "Could not find Chrome (ver. ...)" because the installed browser
          # never matches the one it looks for (PR #184). Read the exact Chrome
          # revision from pa11y-ci's own puppeteer-core and install precisely
          # that build via its bundled @puppeteer/browsers, so installer and
          # launcher always agree on the version.
          CHROME_VERSION="$(node -e "console.log(require('puppeteer-core/lib/cjs/puppeteer/revisions.js').PUPPETEER_REVISIONS.chrome)")"
          echo "Installing Chrome ${CHROME_VERSION} to match pa11y-ci's puppeteer-core"
          # The standalone @puppeteer/browsers CLI defaults --path to the CURRENT
          # WORKING DIRECTORY (it would write to "${PWD}/chrome/..."), but
          # puppeteer-core's launcher only looks in "${HOME}/.cache/puppeteer".
          # Without an explicit --path the download lands in the wrong place and
          # the launcher dies with "Could not find Chrome (ver. ...)" even though
          # the install "succeeded" (PR #185). Pin --path to the launcher's cache
          # dir so installer and launcher agree on the location as well as the
          # version.
          CACHE_DIR="${HOME}/.cache/puppeteer"
          npx --yes @puppeteer/browsers install "chrome@${CHROME_VERSION}" --path "${CACHE_DIR}"
          # Fail loudly if the binary is not where the launcher will look, rather
          # than deferring to a confusing "Could not find Chrome" at scan time.
          if ! find "${CACHE_DIR}/chrome" -name chrome -type f | grep -q .; then
            echo "Chrome ${CHROME_VERSION} was not installed under ${CACHE_DIR}" >&2
            exit 1
          fi
      # pa11y-ci has no --standard CLI flag (that is a pa11y option); the
      # standard and target URLs are configured in pa11yci.json instead.
      - name: Run pa11y-ci (WCAG 2.1 AA) over the dashboard pages
        run: npx pa11y-ci --config pa11yci.json
