name: Accessibility

# Automated accessibility (a11y) gate for the docs/ dashboard UI (Issue #92).
#
# The repo ships an interactive "GRQ Validation Dashboard" from docs/
# (index.html, app.js) and publishes it to GitHub Pages.
# This workflow runs pa11y-ci against the rendered dashboard pages when a
# pull request touches docs/, failing the build on WCAG 2.1 AA violations so
# accessibility regressions (missing form labels, insufficient colour contrast,
# missing alt text, non-keyboard-navigable controls) are caught on the pull
# request that introduces them — the same gate the existing semgrep/gitleaks
# checks apply.
#
# The workflow triggers on every pull_request (not a paths: filter on `on:`)
# because the Main ruleset requires the `pa11y` status check on all PRs. A
# workflow-level paths filter suppresses the run entirely when docs/ is
# unchanged, leaving the required check pending forever (Issue #219, PR #217).
# The scan itself is gated behind a docs-changed job output instead.
#
# Third-party actions are pinned to 40-character commit SHAs to satisfy the
# supply-chain rule, consistent with the other workflows in this repo.

on:
  pull_request:

# Cancel superseded runs (Issue #172): rapid pushes to the same ref otherwise
# queue redundant accessibility scans that each hold a runner. Keying on
# workflow + ref with cancel-in-progress leaves only the latest run for a
# given ref alive, matching every other PR-triggered workflow in this repo.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-docs-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      docs-changed: ${{ steps.filter.outputs.docs }}
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Check for docs/ changes
        id: filter
        run: |
          set -euo pipefail
          git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.sha }} > changed_files.txt
          if grep -E "^(docs/)" changed_files.txt > /dev/null; then
            echo "docs=true" >> $GITHUB_OUTPUT
          else
            echo "docs=false" >> $GITHUB_OUTPUT
          fi

  pa11y:
    needs: check-docs-changes
    if: needs.check-docs-changes.outputs.docs-changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # actions/setup-node@v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          # Track the current LTS rather than a pinned major: Node 20 reaches
          # end-of-life on GitHub-hosted runners (2026-09-16), so pinning it
          # runs pa11y-ci on an unsupported interpreter. lts/* keeps the gate on
          # a maintained runtime, matching markdown-lint.yml (Issue #171).
          node-version: "lts/*"
      # denoland/setup-deno@v2 — needed to run the in-repo Deno static server
      # below. Pinned to a 40-character commit SHA per the supply-chain rule,
      # matching markdown-lint.yml (Issue #532).
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with:
          deno-version: v2.x
      - name: Serve docs/ dashboard and wait for it to come up
        run: |
          set -euo pipefail
          # Serve docs/ with the repo's own reviewed, tested, loopback-bound
          # static server instead of fetching an unpinned npm `http-server` at
          # run time (Issue #532). helpers/server.ts reads the port from
          # Deno.args[0] (default 8000), so passing 8080 keeps the health check
          # and pa11yci.json target URLs unchanged.
          deno run --allow-net --allow-read helpers/server.ts 8080 &
          for i in $(seq 1 30); do
            if curl -sSf http://localhost:8080/index.html >/dev/null 2>&1; then
              echo "Static server is up"
              break
            fi
            sleep 1
          done
      # Drive pa11y with the runner's PRE-INSTALLED Google Chrome instead of
      # downloading a matching Chrome-for-Testing build. pa11y depends on the
      # full `puppeteer` package, which honours PUPPETEER_EXECUTABLE_PATH and
      # launches whatever browser it points at — so the launcher and the binary
      # can no longer disagree on version or cache location. This replaces the
      # hand-rolled `@puppeteer/browsers install` dance that broke repeatedly in
      # CI (PRs #184, #185, and PR #187): every download either landed in the
      # wrong path or no-opped while returning success, leaving the launcher
      # with "Could not find Chrome". GitHub-hosted ubuntu-latest runners ship
      # Google Chrome stable, so no download is needed at all.
      - name: Point Puppeteer at the runner's pre-installed Chrome
        run: |
          set -euo pipefail
          CHROME_BIN="$(command -v google-chrome \
            || command -v google-chrome-stable \
            || command -v chromium-browser \
            || command -v chromium \
            || true)"
          if [ -z "${CHROME_BIN}" ]; then
            echo "No system Chrome/Chromium found on the runner" >&2
            exit 1
          fi
          echo "Using browser at ${CHROME_BIN}"
          echo "PUPPETEER_EXECUTABLE_PATH=${CHROME_BIN}" >> "${GITHUB_ENV}"
      # Install pa11y-ci with a pinned exact version and install scripts
      # disabled (Issue #533, supply-chain hardening per Issue #2184). Without
      # --ignore-scripts the npm lifecycle hooks (preinstall/postinstall/
      # prepare) of pa11y-ci AND its entire transitive tree run in CI against
      # the checked-out workspace, and an unpinned spec floats to whatever the
      # registry serves on each run — the exact install-time code-execution
      # pivot exploited by the Shai-Hulud and Axios npm incidents. pa11y-ci's
      # only build-time hook is puppeteer's postinstall Chrome download, which
      # PUPPETEER_SKIP_DOWNLOAD already no-ops (the scan launches the runner's
      # system Chrome via PUPPETEER_EXECUTABLE_PATH), so --ignore-scripts is
      # safe and changes nothing functionally.
      - name: Install pa11y-ci
        run: npm install --no-save --ignore-scripts pa11y-ci@4.1.1
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
      # pa11y-ci has no --standard CLI flag (that is a pa11y option); the
      # standard and target URLs are configured in pa11yci.json instead. Run the
      # locally-installed, script-disabled binary directly rather than a second
      # `npx pa11y-ci` fetch, so the audited copy is the one that executes
      # (Issue #533).
      - name: Run pa11y-ci (WCAG 2.1 AA) over the dashboard pages
        run: ./node_modules/.bin/pa11y-ci --config pa11yci.json
